name: CI

on:
#  push:
#    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: |
          go build -o /tmp/gguf ./cmd/gguf
          go build -o /tmp/bench ./cmd/bench

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Download test model
        run: |
          mkdir -p models
          curl -L -o models/Qwen3-0.6B-Q8_0.gguf \
            https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf

      - name: Integration tests
        run: go test -tags=integration ./test/integration/...
